colors:
  # Default colors
  primary:
    background: '0x131A1C'
    foreground: '0xC5C8C9'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '0xd6d6d6'
    cursor: '0x232a2c'

  # Normal colors
  normal:
    black:   '0x1b2224'
    red:     '0xf65b5b'
    green:   '0x6bb05d'
    yellow:  '0xe59e67'
    blue:    '0x53A7BF'
    magenta: '0xbb8fe5'
    cyan:    '0x51a39f'
    white:   '0xc4c4c4'

  # Bright colors
  bright:
    black:   '0x232a2c'
    red:     '0xc26f6f'
    green:   '0x8dc776'
    yellow:  '0xe7ac7e'
    blue:    '0x6CBAD1'
    magenta: '0xb185db'
    cyan:    '0x6db0ad'
    white:   '0xcecece'
  # Dim colors
  #
  # If the dim colors are not set, they will be calculated automatically based
  # on the `normal` colors.
  #dim:
  #  black:   '0x000000'
  #  red:     '0x8c3336'
  #  green:   '0x7a8530'
  #  yellow:  '0x97822e'
  #  blue:    '0x506d8f'
  #  magenta: '0x80638e'
  #  cyan:    '0x497e7a'
  #  white:   '0x9a9a9a'

  # Indexed Colors
  #
  # The indexed colors include all colors from 16 to 256.
  # When these are not set, they're filled with sensible defaults.
  #
  # Example:
  #   `- { index: 16, color: '0xff00ff' }`
  #
  #indexed_colors: []

# Visual Bell
#
# Any time the BEL code is received, Alacritty "rings" the visual bell. Once
